# Linting (uses flake8) and SAST scan (BANDIT)

     # fail-fast: true (default)
       # → If one matrix job fails, 
       #the remaining running jobs are cancelled immediately.
       # fail-fast: false
     # → If one job fails, other matrix jobs continue running

name: Code Quality
on: 
  workflow_dispatch:


jobs:
  validate:
     runs-on: ubuntu-latest
     strategy:
      fail-fast: false  
      matrix:                                           
         python-version: [ "3.11", "3.12", "3.13"]
     steps:
       - name: Code Chcekout
         uses: actions/checkout@v4
       - name: Setup Python
         uses: actions/setup-python@v5
         with:
             python-version: ${{ matrix.python-version }}  
       - name: Install Dependencies
         run: pip install -r requirements.txt
       
       - name: Linting
         run : flake8 app.py #Must include the file name here
       - name: run SAST
         run: bandit -r app.py #Must inlcude -r with app.py
         














 
