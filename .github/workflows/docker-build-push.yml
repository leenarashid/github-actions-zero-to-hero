name: Docker Build & Push 

on: 
  workflow_call:
   inputs:
    docker_username:
       required: true
       type: string
   secrets:
    docker_token:
      required: true

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:

            - name: Code Checkout
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ inputs.docker_username }}
                password: ${{ secrets.docker_token }}
                
            - name: Build & Push to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ${{ inputs.docker_username }}/github-actions-app:${{ github.ref_name }}
                    ${{ inputs.docker_username }}/github-actions-app:latest
                    ${{ inputs.docker_username }}/github-actions-app:${{ github.sha}}
