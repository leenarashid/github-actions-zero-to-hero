#Uses trivy Image Scanner for CVEs (Common Vulnerabilities)
name: Image Scan
on:
  workflow_call:


  
jobs:
  image-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
           username: ${{ secrets.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_TOKEN}} 
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/github-actions-app:latest
          severity: CRITICAL
          exit-code: 1
