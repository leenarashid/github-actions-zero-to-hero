name: Python Lint
on: 
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:     


steps: 
  - name: checkout code
    uses: actions/checkout@v4 

  - name: Python Setup
    uses: actions/setup-python@v5
      with:
        python-version: "3.13"       
  - name: Install libs and dependencies
    run: pip install -r requirements.txt
  - name: Run linter
    run: flake8 app.py         